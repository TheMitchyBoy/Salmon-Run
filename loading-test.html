<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>MindAR Loading Test</title>

  <script>
    window.salmonAR = { scriptErrors: [] };
    window.salmonAR.scriptFailed = function (src) { window.salmonAR.scriptErrors.push(src); };
  </script>
  <!-- jsDelivr primary + a second-CDN fallback (document.write preserves load order).
       A-Frame's own host (aframe.io) is avoided — it is the usual cause of a
       "Couldn't load required libraries" failure. -->
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.6.0/dist/aframe-master.min.js"
          onerror="window.salmonAR.scriptFailed('A-Frame (jsdelivr)')"></script>
  <script>
    window.AFRAME || (window.salmonAR.scriptFailed('A-Frame (jsdelivr)'),
      document.write('<script src="https://unpkg.com/aframe@1.6.0/dist/aframe-master.min.js"><\/script>'));
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"
          onerror="window.salmonAR.scriptFailed('MindAR (jsdelivr)')"></script>
  <script>
    (window.AFRAME && AFRAME.components['mindar-image']) || (window.salmonAR.scriptFailed('MindAR (jsdelivr)'),
      document.write('<script src="https://unpkg.com/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"><\/script>'));
  </script>

  <style>
    body { margin: 0; font-family: -apple-system, system-ui, sans-serif; }
    #status {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      padding: 8px 16px; border-radius: 999px;
      background: rgba(12, 28, 40, 0.72); color: #eaf4f4;
      font-size: 15px; z-index: 10; backdrop-filter: blur(6px);
    }
    #status .dot { display:inline-block; width:8px; height:8px; border-radius:50%;
      background:#4cd2b0; margin-right:7px; vertical-align:middle; }

    #fatal {
      position: fixed; inset: 0; z-index: 1000; display: none;
      align-items: center; justify-content: center; padding: 24px;
      background: linear-gradient(160deg, #0c1c28, #122b3a); color: #eaf4f4; overflow: auto;
    }
    #fatal.show { display: flex; }
    #fatal .card {
      max-width: 460px; width: 100%; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 24px 22px;
    }
    #fatal h1 { font-size: 19px; margin: 0 0 6px; }
    #fatal .lead { font-size: 15px; color: #b9d2d6; margin: 0 0 16px; line-height: 1.45; }
    #fatal ul { margin: 0; padding-left: 20px; }
    #fatal li { font-size: 14.5px; line-height: 1.55; margin-bottom: 8px; }
    #fatal code { background: rgba(255,255,255,0.1); padding: 1px 6px; border-radius: 6px; font-size: 13px; }
  </style>
</head>

<body>
  <div id="status"><span class="dot"></span>Point at the MindAR card image</div>

  <div id="fatal" role="alert" aria-live="assertive">
    <div class="card">
      <h1 id="fatal-title">Something went wrong</h1>
      <p class="lead" id="fatal-lead"></p>
      <ul id="fatal-list"></ul>
    </div>
  </div>

  <!-- These two sources are MindAR's OWN hosted example files. Nothing local is required,
       so if THIS hangs, the problem is your environment (http vs https, blocked CDN),
       NOT your assets. If this works, your setup is fine and your own targets.mind /
       salmon.glb were just missing. -->
  <a-scene
    mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind; autoStart: true;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <a-asset-item id="example" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/softmind/scene.gltf"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model
        src="#example"
        position="0 0 0.1"
        scale="0.005 0.005 0.005"
        rotation="0 0 0"></a-gltf-model>
    </a-entity>
  </a-scene>

  <script>
    const sceneEl = document.querySelector('a-scene');
    const status = document.getElementById('status');
    let arReady = false, fatalShown = false;

    function showFatal(title, lead, items) {
      if (fatalShown) return;
      fatalShown = true;
      document.getElementById('fatal-title').textContent = title;
      document.getElementById('fatal-lead').textContent = lead;
      const list = document.getElementById('fatal-list');
      list.innerHTML = '';
      (items || []).forEach((html) => {
        const li = document.createElement('li');
        li.innerHTML = html;
        list.appendChild(li);
      });
      document.getElementById('fatal').classList.add('show');
      status.style.display = 'none';
      document.querySelectorAll('.mindar-ui-overlay').forEach((el) => { el.style.display = 'none'; });
    }

    const isLocalhost = ['localhost', '127.0.0.1', '[::1]'].includes(location.hostname);
    if (location.protocol === 'file:' || (!window.isSecureContext && !isLocalhost)) {
      const how = location.protocol === 'file:'
        ? 'You opened the file directly (<code>file://</code>).'
        : 'This page is served over <code>' + location.protocol + '//</code>.';
      showFatal(
        'Camera blocked — needs HTTPS',
        'AR needs the camera, and browsers only grant camera access on a secure connection.',
        [
          how + ' That blocks the camera, so nothing can start — and it is NOT a problem with your assets.',
          'Host over <code>https://</code> (GitHub Pages / Netlify / Vercel), or test via <code>http://localhost</code>.'
        ]
      );
    } else if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showFatal('Camera not available', 'This browser does not expose a camera API.',
        ['Open in Safari (iOS) or Chrome (Android). Avoid in-app browsers.']);
    } else if (typeof AFRAME === 'undefined' || !(AFRAME.components && AFRAME.components['mindar-image'])) {
      const missing = (typeof AFRAME === 'undefined') ? ['A-Frame'] : ['MindAR'];
      showFatal("Couldn't load required libraries", 'A required library did not load — even after trying a backup CDN.',
        ['Missing: <code>' + missing.join('</code>, <code>') + '</code>.', 'Check your connection; the CDNs (cdn.jsdelivr.net, unpkg.com) may be blocked on this network.']);
    }

    if (!fatalShown && typeof AFRAME !== 'undefined') {
      sceneEl.addEventListener('arReady', () => { arReady = true; });
      sceneEl.addEventListener('arError', () => {
        showFatal("Couldn't start the camera",
          'The AR engine failed to start — almost always a camera-permission issue.',
          ['Tap <strong>Allow</strong> when asked for camera access.', 'Clear a previously-denied permission for this site and reload.']);
      });
      sceneEl.addEventListener('loaded', () => {
        const target = document.querySelector('[mindar-image-target]');
        target.addEventListener('targetFound', () => {
          status.innerHTML = '<span class="dot"></span>Tracking — setup works';
        });
        target.addEventListener('targetLost', () => {
          status.innerHTML = '<span class="dot"></span>Point at the MindAR card image';
        });
      });
      setTimeout(() => {
        if (!arReady && !fatalShown) {
          showFatal('Still loading…', 'The AR camera is taking longer than expected to start.',
            ['Reload and tap <strong>Allow</strong> for the camera.', 'Close other apps/tabs using the camera, then reload.']);
        }
      }, 15000);
    }
  </script>
</body>
</html>
