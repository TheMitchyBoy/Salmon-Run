name: Deploy to GitHub Pages

# Publishes the site to GitHub Pages on every push to the default branch so the
# app is always served over HTTPS — which the camera (and therefore WebAR)
# requires. Opening the files over file:// or plain http:// blocks the camera and
# is the most common reason the app "won't run".

on:
  push:
    branches:
      - main
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        # enablement: true turns Pages on automatically if it isn't already, so
        # no manual repo-settings step is needed.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the repository root (index.html and assets live there).
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
