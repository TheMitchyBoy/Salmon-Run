<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Ketchikan Creek — Salmon AR</title>

  <!-- Diagnostics bootstrap. Runs before anything else so we can catch a CDN script
       that fails to load, and so the rest of the page can report problems clearly
       instead of leaving the user stuck on an infinite loading spinner. -->
  <script>
    window.salmonAR = { scriptErrors: [] };
    window.salmonAR.scriptFailed = function (src) {
      window.salmonAR.scriptErrors.push(src);
    };
  </script>

  <!-- Libraries are bundled LOCALLY (./vendor) so the app does not depend on any
       external CDN. Restricted / corporate / mobile networks frequently block
       CDNs (aframe.io, jsdelivr, unpkg), which is what caused "Couldn't load
       required libraries". These files load from the same origin as this page, so
       if the page loads at all, the libraries load too. A CDN is kept ONLY as a
       last-resort fallback (via document.write so load ORDER is preserved —
       A-Frame must exist before MindAR and aframe-extras run). -->

  <!-- 1) A-Frame core. 1.6.0 is the version MindAR's current quick-start pairs with.
          If anything renders oddly, swap in 1.5.0 — both are known-good with mind-ar 1.2.5. -->
  <script src="./vendor/aframe-1.6.0.min.js"
          onerror="window.salmonAR.scriptFailed('A-Frame (local)')"></script>
  <script>
    window.AFRAME || document.write('<script src="https://cdn.jsdelivr.net/npm/aframe@1.6.0/dist/aframe-master.min.js"><\/script>');
  </script>

  <!-- 2) MindAR image-tracking, A-Frame build. This is what watches the camera for your printed sign. -->
  <script src="./vendor/mindar-image-aframe.prod.js"
          onerror="window.salmonAR.scriptFailed('MindAR (local)')"></script>
  <script>
    (window.AFRAME && AFRAME.components['mindar-image']) ||
      document.write('<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"><\/script>');
  </script>

  <!-- 3) aframe-extras gives you the "animation-mixer" component, which plays the swim
          animation baked into your GLB salmon model. -->
  <script src="./vendor/aframe-extras-7.2.0.min.js"
          onerror="window.salmonAR.scriptFailed('aframe-extras (local)')"></script>
  <script>
    (window.AFRAME && AFRAME.components['animation-mixer']) ||
      document.write('<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"><\/script>');
  </script>

  <style>
    /* Keep the UI almost invisible — the salmon are the thing people should look at. */
    body { margin: 0; font-family: -apple-system, system-ui, sans-serif; }

    #status {
      position: fixed;
      top: env(safe-area-inset-top, 12px);
      left: 50%;
      transform: translateX(-50%);
      margin-top: 12px;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(12, 28, 40, 0.72);
      color: #eaf4f4;
      font-size: 15px;
      letter-spacing: 0.2px;
      z-index: 10;
      backdrop-filter: blur(6px);
      transition: opacity 0.3s ease;
    }
    #status .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4cd2b0;
      margin-right: 7px;
      vertical-align: middle;
    }

    /* Fatal/diagnostic overlay. Shown only when something goes wrong so the user
       gets a clear reason instead of staring at MindAR's loading spinner forever. */
    #fatal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(160deg, #0c1c28, #122b3a);
      color: #eaf4f4;
      -webkit-overflow-scrolling: touch;
      overflow: auto;
    }
    #fatal.show { display: flex; }
    #fatal .card {
      max-width: 460px;
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 24px 22px;
    }
    #fatal h1 {
      font-size: 19px;
      margin: 0 0 6px;
    }
    #fatal .lead {
      font-size: 15px;
      color: #b9d2d6;
      margin: 0 0 16px;
      line-height: 1.45;
    }
    #fatal ul { margin: 0; padding-left: 20px; }
    #fatal li { font-size: 14.5px; line-height: 1.55; margin-bottom: 8px; }
    #fatal code {
      background: rgba(255, 255, 255, 0.1);
      padding: 1px 6px;
      border-radius: 6px;
      font-size: 13px;
    }
    #fatal .badge {
      display: inline-block;
      font-size: 12px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: #ffd27d;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <!-- Status pill. Starts as an instruction, switches to "running" once the sign is detected. -->
  <div id="status"><span class="dot"></span>Point your phone at the salmon sign</div>

  <!-- Diagnostic overlay. Hidden until something fails; content is filled in by JS. -->
  <div id="fatal" role="alert" aria-live="assertive">
    <div class="card">
      <div class="badge">Salmon AR</div>
      <h1 id="fatal-title">Something went wrong</h1>
      <p class="lead" id="fatal-lead"></p>
      <ul id="fatal-list"></ul>
    </div>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <!-- Swap this for your real salmon model. The bundled salmon.glb has NO baked
           animation clip, so "swimming" is produced procedurally below (a tail-wag
           yaw + a gentle bob) rather than with animation-mixer. -->
      <a-asset-item id="salmon" src="./salmon.glb"></a-asset-item>
    </a-assets>

    <!-- A camera with no look-controls — MindAR drives the view from the marker. -->
    <a-camera position="0 0 0" look-controls="false"></a-camera>

    <!-- Explicit lights. Without these the GLB can render very dark (almost
         invisible) over the bright camera feed, which reads as "no salmon". -->
    <a-entity light="type: ambient; color: #ffffff; intensity: 1.4"></a-entity>
    <a-entity light="type: directional; color: #ffffff; intensity: 2.2" position="0.5 1 1"></a-entity>

    <!-- Everything inside this entity is anchored to image target #0 (your first/only sign).
         The marker is normalized so its WIDTH = 1 unit, so positions live roughly in
         -0.5..0.5 on X. The salmon.glb is ~0.5 units long at scale 1, so a scale of
         ~0.6 makes each fish about a third of the marker — clearly visible. The old
         scale (~0.12) made them ~6% of the marker, i.e. nearly invisible. -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- Each salmon = an outer entity that DRIFTS upstream (position on X) wrapping a
           model that SWIMS in place (tail-wag yaw + bob). Splitting drift and swim onto
           separate entities lets both run at once without fighting over one property.
           rotation 0 0 0 keeps the fish broadside to the camera, facing +X (the drift
           direction). If your model faces the other way, change rotation to 0 180 0. -->

      <!-- Salmon #1 -->
      <a-entity
        animation__drift="property: position; from: -0.65 -0.18 0.04; to: 0.65 -0.18 0.04; dur: 7000; loop: true; easing: linear">
        <a-gltf-model class="salmon" src="#salmon"
          scale="0.6 0.6 0.6"
          rotation="0 0 0"
          animation__swim="property: rotation; from: 0 -13 0; to: 0 13 0; dir: alternate; loop: true; dur: 460; easing: easeInOutSine"
          animation__bob="property: position; from: 0 -0.02 0; to: 0 0.02 0; dir: alternate; loop: true; dur: 900; easing: easeInOutSine">
        </a-gltf-model>
      </a-entity>

      <!-- Salmon #2 -->
      <a-entity
        animation__drift="property: position; from: -0.65 0.02 0.02; to: 0.65 0.02 0.02; dur: 8500; loop: true; easing: linear; delay: 1500">
        <a-gltf-model class="salmon" src="#salmon"
          scale="0.5 0.5 0.5"
          rotation="0 0 0"
          animation__swim="property: rotation; from: 0 -13 0; to: 0 13 0; dir: alternate; loop: true; dur: 400; easing: easeInOutSine"
          animation__bob="property: position; from: 0 -0.02 0; to: 0 0.02 0; dir: alternate; loop: true; dur: 1000; easing: easeInOutSine">
        </a-gltf-model>
      </a-entity>

      <!-- Salmon #3 -->
      <a-entity
        animation__drift="property: position; from: -0.65 0.2 0.07; to: 0.65 0.2 0.07; dur: 6000; loop: true; easing: linear; delay: 800">
        <a-gltf-model class="salmon" src="#salmon"
          scale="0.7 0.7 0.7"
          rotation="0 0 0"
          animation__swim="property: rotation; from: 0 -13 0; to: 0 13 0; dir: alternate; loop: true; dur: 520; easing: easeInOutSine"
          animation__bob="property: position; from: 0 -0.025 0; to: 0 0.025 0; dir: alternate; loop: true; dur: 850; easing: easeInOutSine">
        </a-gltf-model>
      </a-entity>

    </a-entity>
  </a-scene>

  <script>
    const sceneEl = document.querySelector('a-scene');
    const status = document.getElementById('status');

    let arReady = false;   // MindAR engine + camera are live
    let fatalShown = false;

    // Render the diagnostic overlay. This is the whole point of this file's error
    // handling: turn MindAR's silent, endless loading spinner into a clear reason.
    function showFatal(title, lead, items) {
      if (fatalShown) return;
      fatalShown = true;

      document.getElementById('fatal-title').textContent = title;
      document.getElementById('fatal-lead').textContent = lead;

      const list = document.getElementById('fatal-list');
      list.innerHTML = '';
      (items || []).forEach((html) => {
        const li = document.createElement('li');
        li.innerHTML = html;
        list.appendChild(li);
      });

      document.getElementById('fatal').classList.add('show');
      status.style.display = 'none';

      // Hide MindAR's spinner / scanning UI so it doesn't sit behind the message.
      document.querySelectorAll('.mindar-ui-overlay').forEach((el) => {
        el.style.display = 'none';
      });
    }

    // ---- Pre-flight checks: catch the most common "app won't load" causes early. ----

    // 1) Insecure context. Browsers only allow camera access on https:// or
    //    http://localhost. Opening the file directly (file://) or over plain http
    //    on a phone is the #1 reason this page hangs forever.
    const isLocalhost = ['localhost', '127.0.0.1', '[::1]'].includes(location.hostname);
    // Note: Chrome treats file:// as a "secure context", so check the protocol
    // explicitly — file:// is the most common reason this page never starts.
    if (location.protocol === 'file:' || (!window.isSecureContext && !isLocalhost)) {
      const how = location.protocol === 'file:'
        ? 'You opened the file directly (<code>file://</code>).'
        : 'This page is being served over <code>' + location.protocol + '//</code>.';
      showFatal(
        'Camera blocked — needs HTTPS',
        'AR needs the camera, and browsers only grant camera access on a secure connection.',
        [
          how + ' That blocks the camera, so the app can never start.',
          'Host the files over <code>https://</code> — GitHub Pages, Netlify, and Vercel all do this for free.',
          'For local testing, run a server and open <code>http://localhost</code> (e.g. <code>python3 -m http.server</code>).'
        ]
      );
    }

    // 2) Camera API missing entirely (very old / non-standard browser).
    else if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showFatal(
        'Camera not available',
        'This browser does not expose a camera API, so image tracking cannot run.',
        [
          'Open the link in a modern mobile browser such as Safari (iOS) or Chrome (Android).',
          'Make sure you are not inside an in-app browser (e.g. a link opened from a chat app) — those sometimes block the camera.'
        ]
      );
    }

    // 3) A required library is genuinely missing (primary AND fallback CDN failed).
    //    We check the actual capability, not just the onerror flags, so a primary
    //    failure that recovered via the fallback CDN does NOT show a false error.
    else if (typeof AFRAME === 'undefined' || !(AFRAME.components && AFRAME.components['mindar-image'])) {
      const missing = (typeof AFRAME === 'undefined') ? ['A-Frame'] : ['MindAR'];
      showFatal(
        "Couldn't load required libraries",
        'A library this app depends on did not load — even after trying a backup CDN.',
        [
          'Missing: <code>' + missing.join('</code>, <code>') + '</code>.',
          'Check your internet connection and reload.',
          'If you are on a restricted network, the CDNs (<code>cdn.jsdelivr.net</code>, <code>unpkg.com</code>) may be blocked.'
        ]
      );
    }

    if (!fatalShown && typeof AFRAME !== 'undefined') {
      // MindAR fires arReady when the camera + tracking engine are live, and
      // arError if it cannot start (e.g. camera permission denied).
      sceneEl.addEventListener('arReady', () => { arReady = true; });

      sceneEl.addEventListener('arError', () => {
        showFatal(
          "Couldn't start the camera",
          'The AR engine failed to start. This is almost always a camera-permission problem.',
          [
            'When the browser asks to use the camera, tap <strong>Allow</strong>.',
            'If you blocked it before, clear the permission for this site (in your browser settings) and reload.',
            'Close other apps or tabs that might be holding the camera.'
          ]
        );
      });

      // MindAR fires these events on the target entity when it finds / loses your sign.
      sceneEl.addEventListener('loaded', () => {
        const target = document.querySelector('[mindar-image-target]');

        target.addEventListener('targetFound', () => {
          status.innerHTML = '<span class="dot"></span>The salmon are running';
        });

        target.addEventListener('targetLost', () => {
          status.innerHTML = '<span class="dot"></span>Point your phone at the salmon sign';
        });

        // If the salmon model itself fails to load, say so instead of showing an
        // empty marker (which looks identical to "marker not detected").
        const firstSalmon = document.querySelector('.salmon');
        if (firstSalmon) {
          firstSalmon.addEventListener('model-error', () => {
            showFatal(
              "Couldn't load the salmon model",
              'The 3D model (salmon.glb) failed to load, so there is nothing to show on the marker.',
              [
                'Make sure <code>salmon.glb</code> is deployed next to <code>index.html</code>.',
                'Check your connection — the model is several megabytes.',
                'Reload the page and try again.'
              ]
            );
          });
        }
      });

      // Watchdog: if the camera/engine never comes up, surface guidance instead of
      // leaving the user on a spinner with no idea what's wrong.
      setTimeout(() => {
        if (!arReady && !fatalShown) {
          showFatal(
            'Still loading…',
            "The AR camera is taking longer than expected to start. Common causes:",
            [
              'Camera permission was dismissed or denied — reload and tap <strong>Allow</strong>.',
              'A slow connection is still downloading the model — give it a moment and retry.',
              'Another app or tab is using the camera — close it, then reload.'
            ]
          );
        }
      }, 15000);
    }
  </script>
</body>
</html>
