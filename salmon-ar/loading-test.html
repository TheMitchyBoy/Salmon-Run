<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>MindAR Loading Test</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; font-family: -apple-system, system-ui, sans-serif; }
    #status {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      padding: 8px 16px; border-radius: 999px;
      background: rgba(12, 28, 40, 0.72); color: #eaf4f4;
      font-size: 15px; z-index: 10; backdrop-filter: blur(6px);
    }
    #status .dot { display:inline-block; width:8px; height:8px; border-radius:50%;
      background:#4cd2b0; margin-right:7px; vertical-align:middle; }
  </style>
</head>

<body>
  <div id="status"><span class="dot"></span>Point at the MindAR card image</div>

  <!-- These two sources are MindAR's OWN hosted example files. Nothing local is required,
       so if THIS hangs, the problem is your environment (http vs https, blocked CDN),
       NOT your assets. If this works, your setup is fine and your own targets.mind /
       salmon.glb were just missing. -->
  <a-scene
    mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind; autoStart: true;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <a-asset-item id="example" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/softmind/scene.gltf"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model
        src="#example"
        position="0 0 0.1"
        scale="0.005 0.005 0.005"
        rotation="0 0 0"></a-gltf-model>
    </a-entity>
  </a-scene>

  <script>
    const sceneEl = document.querySelector('a-scene');
    const status = document.getElementById('status');
    sceneEl.addEventListener('loaded', () => {
      const target = document.querySelector('[mindar-image-target]');
      target.addEventListener('targetFound', () => {
        status.innerHTML = '<span class="dot"></span>Tracking — setup works';
      });
      target.addEventListener('targetLost', () => {
        status.innerHTML = '<span class="dot"></span>Point at the MindAR card image';
      });
    });
  </script>
</body>
</html>
